site_name: "Project Docs"
docs_dir: "docs"
site_dir: "site"
use_directory_urls: true

hooks:
  - scripts/load_gendoc_config.py
  - scripts/clean_nav.py
  - scripts/copy_assets.py

watch:
  - javascripts
  - stylesheets

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs
    - content.code.copy
    - toc.integrate

  palette:
    # Light mode — custom scheme so CSS variables control all colors
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY_EXT.md

validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    not_found: ignore
  nav:
    omitted_files: ignore
    not_found: ignore

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - attr_list
  - md_in_html

extra_css:
  - /stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - /javascripts/mermaid.js
  - /javascripts/external-links.js
  - /javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - /javascripts/nav-state.js
  - /javascripts/breadcrumbs.js
